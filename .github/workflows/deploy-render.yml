name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update Render web service
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_OWNER_ID: ${{ secrets.RENDER_OWNER_ID }}
        run: |
          set -euo pipefail

          SERVICE_NAME="blackjack-multiplayer"
          REPO_URL="https://github.com/VINISHKOss/blackjack-multiplayer"

          existing=$(curl -fsS \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            "https://api.render.com/v1/services?limit=100" \
            | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          for item in data:
              s=item.get('service') or item
              if s.get('name')==\"${SERVICE_NAME}\":
                  print(s['id'])
                  break
          " || true)

          if [ -z "${existing}" ]; then
            curl -fsS -X POST "https://api.render.com/v1/services" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{
                \"type\": \"web_service\",
                \"name\": \"${SERVICE_NAME}\",
                \"ownerId\": \"${RENDER_OWNER_ID}\",
                \"repo\": \"${REPO_URL}\",
                \"autoDeploy\": \"yes\",
                \"branch\": \"main\",
                \"serviceDetails\": {
                  \"env\": \"docker\",
                  \"plan\": \"free\",
                  \"region\": \"frankfurt\",
                  \"healthCheckPath\": \"/\",
                  \"envSpecificDetails\": {
                    \"dockerfilePath\": \"./Dockerfile\",
                    \"dockerContext\": \".\"
                  }
                },
                \"envVars\": [
                  { \"key\": \"ASPNETCORE_ENVIRONMENT\", \"value\": \"Production\" }
                ]
              }"
          else
            curl -fsS -X POST "https://api.render.com/v1/services/${existing}/deploys" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Content-Type: application/json" \
              -d '{"clearCache":"do_not_clear"}'
          fi